<!DOCTYPE html>
<html lang="es-AR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | Sabor Resuelto</title>
    <link rel="stylesheet" href="style.css?v=9">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Raleway:wght@300;400;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="logo-nuevo.png" type="image/png">
    <style>
        .error-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: var(--warm-pearl);
        }
        .error-content h1 {
            font-size: 8rem;
            color: var(--primary-green);
            margin-bottom: 10px;
            font-family: 'Montserrat', sans-serif;
            line-height: 1;
        }
        .error-content h2 {
            font-size: 2.5rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }
        .error-content p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 40px;
        }
    </style>
</head>

<body>
    <!-- Nav -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-container" style="justify-content: center;">
            <a href="index.html" class="logo-link">
                <img src="logo-nuevo.png" alt="Sabor Resuelto Logo" class="logo-img">
            </a>
        </div>
    </nav>

    <div class="error-page">
        <div class="container error-content">
            <h1 class="reveal">404</h1>
            <h2>¡Uy! Esta vianda se nos escapó.</h2>
            <p>La página que buscás no existe o fue movida a otra cocina.</p>
            <a href="index.html" class="btn-primary">Volver al Menú Principal</a>
        </div>
    </div>

    <!-- Footer -->
    <footer style="background: white; border-top: 1px solid rgba(0,0,0,0.05); padding: 40px 0; text-align: center;">
        <div class="container">
            <img src="logo-nuevo.png" alt="Sabor Resuelto" style="max-width: 150px; opacity: 0.6;">
        </div>
    </footer>
</body>
</html>
